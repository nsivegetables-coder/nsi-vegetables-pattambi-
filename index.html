<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>NSI VEGETABLES</title>
                <link rel="stylesheet" href="style.css">
                </head>
                <body>

                    <div class="header">
                            <h1>🥬 NSI VEGETABLES</h1>
                                </div>

                                    <div class="container">
                                            <div class="products-section">
                                                        <div id="products">Loading products...</div>
                                                                </div>

                                                                        <div class="cart-section">
                                                                                    <h2>🛒 Cart</h2>
                                                                                                <div id="cart-items">Cart Empty</div>
                                                                                                            <div class="cart-total" id="cart-total">Total ₹0</div>
                                                                                                                        
                                                                                                                                    <div class="order-form">
                                                                                                                                                    <input type="text" id="cust-name" placeholder="Name" required>
                                                                                                                                                                    <input type="tel" id="cust-phone" placeholder="Phone" required>
                                                                                                                                                                                    <textarea id="cust-address" placeholder="Address" rows="3" required></textarea>
                                                                                                                                                                                                    <button type="button" onclick="sendWhatsAppOrder()">WhatsApp Order</button>
                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                <script src="script.js"></script>
                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                </html>
