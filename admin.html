<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>NSI Admin - Price List & Bulk Sender</title>
                <style>
                        body { font-family: Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 20px; color: #333; }
                                .admin-box { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
                                        h2 { color: #27ae60; margin-top: 0; }
                                                label { font-weight: bold; display: block; margin: 10px 0 5px; font-size: 14px; }
                                                        textarea, input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; margin-bottom: 10px; }
                                                                button { width: 100%; background: #27ae60; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
                                                                        .btn-blue { background: #1e88e5; }
                                                                                .status-box { background: #e8f5e9; padding: 10px; border-radius: 6px; margin-top: 15px; display: none; text-align: center; font-weight: bold; }
                                                                                    </style>
                                                                                    </head>
                                                                                    <body>

                                                                                    <div class="admin-box">
                                                                                        <h2>📋 ഇന്നത്തെ പ്രൈസ് ലിസ്റ്റ്</h2>
                                                                                            <p style="font-size: 13px; color: #555;">ഗൂഗിൾ ഷീറ്റിൽ നിന്നുള്ള ഇന്നത്തെ വിലവിവരപ്പട്ടിക ഇവിടെ തനിയെ നിർമ്മിക്കപ്പെടും.</p>
                                                                                                <button class="btn-blue" onclick="generatePriceList()">വിലവിവരപ്പട്ടിക നിർമ്മിക്കുക (Generate)</button>
                                                                                                    <textarea id="generated-price-list" rows="8" placeholder="ഇവിടെ ലിസ്റ്റ് തനിയെ വരും..."></textarea>
                                                                                                        <button onclick="copyPriceList()">കോപ്പി ചെയ്യുക (Copy Text)</button>
                                                                                                        </div>

                                                                                                        <div class="admin-box">
                                                                                                            <h2>🚀 Route Bulk Sender</h2>
                                                                                                                <label>Select Route:</label>
                                                                                                                    <select id="route-select" onchange="loadNumbersForRoute()">
                                                                                                                            <option value="route1">Route 1 (Monday)</option>
                                                                                                                                    <option value="route2">Route 2 (Tuesday)</option>
                                                                                                                                            <option value="route3">Route 3 (Wednesday)</option>
                                                                                                                                                    <option value="route4">Route 4 (Thursday)</option>
                                                                                                                                                            <option value="route5">Route 5 (Friday)</option>
                                                                                                                                                                    <option value="route6">Route 6 (Saturday)</option>
                                                                                                                                                                        </select>

                                                                                                                                                                            <label>Enter Phone Numbers (ഒരു വരിയിൽ ഒന്ന്):</label>
                                                                                                                                                                                <textarea id="phone-numbers" rows="5" placeholder="917593925926" oninput="saveNumbersForRoute()"></textarea>

                                                                                                                                                                                    <label>Offer Message:</label>
                                                                                                                                                                                        <textarea id="offer-message" rows="5" placeholder="ഓഫർ മെസ്സേജ് ഇവിടെ ടൈപ്പ് ചെയ്യുക..."></textarea>

                                                                                                                                                                                            <button id="send-btn" onclick="startBulkSend()">Start Sending</button>
                                                                                                                                                                                                <div id="status" class="status-box"></div>
                                                                                                                                                                                                </div>

                                                                                                                                                                                                <script>
                                                                                                                                                                                                    const baseUrl = "https://script.google.com/macros/s/AKfycbyg9RmH2iFblNzWNBBL7J4SR-W003CQnDju8RPoPBINF_cD6Fdidkn7h9QLvMsL8u4z/exec";
                                                                                                                                                                                                        let numberList = [];
                                                                                                                                                                                                            let currentIndex = 0;
                                                                                                                                                                                                                let messageText = "";

                                                                                                                                                                                                                    window.onload = function() {
                                                                                                                                                                                                                            document.getElementById("offer-message").value = "🥬 NSI VEGETABLES 🥬\n\nഇന്നത്തെ ഫ്രഷ് പച്ചക്കറികളുടെ വില അറിയാനും ഓർഡർ ചെയ്യാനും താഴെ കാണുന്ന ലിങ്ക് ക്ലിക്ക് ചെയ്യൂ:\n👉 [നിങ്ങളുടെ_വെബ്സൈറ്റ്_ലിങ്ക്]";
                                                                                                                                                                                                                                    loadNumbersForRoute();
                                                                                                                                                                                                                                        };

                                                                                                                                                                                                                                            // 💡 ഗൂഗിൾ ഷീറ്റിൽ നിന്ന് വില വലിച്ചെടുത്ത് വാട്സാപ്പ് ഫോർമാറ്റിൽ ആക്കുന്ന ഫങ്ക്ഷൻ
                                                                                                                                                                                                                                                function generatePriceList() {
                                                                                                                                                                                                                                                        const fetchUrl = `${baseUrl}?_=${new Date().getTime()}`;
                                                                                                                                                                                                                                                                document.getElementById("generated-price-list").value = "Loading prices from Google Sheet...";

                                                                                                                                                                                                                                                                        fetch(fetchUrl)
                                                                                                                                                                                                                                                                                    .then(response => response.json())
                                                                                                                                                                                                                                                                                                .then(data => {
                                                                                                                                                                                                                                                                                                                let products = Array.isArray(data) ? data : (data.data || []);
                                                                                                                                                                                                                                                                                                                                if (products.length === 0) {
                                                                                                                                                                                                                                                                                                                                                    document.getElementById("generated-price-list").value = "No products found!";
                                                                                                                                                                                                                                                                                                                                                                        return;
                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                        let listText = `🥬 *NSI VEGETABLES PRICE LIST* 🥬\n📆 Date: ${new Date().toLocaleDateString('en-IN')}\n\n`;
                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                        products.forEach((item) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                            const keys = Object.keys(item).reduce((acc, key) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    acc[key.toLowerCase().replace(/\s+/g, '')] = item[key];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            return acc;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }, {});

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    let name = keys['name'] || "No Name";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        let offPrice = parseFloat(keys['offerprice']) || 0;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (name !== "No Name" && offPrice > 0) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    listText += `🔹 ${name}  ➔  *₹${offPrice}/kg*\n`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        listText += `\n🛒 ഓർഡർ ചെയ്യാൻ താഴെയുള്ള ലിങ്കിൽ ഞെക്കുക:\n👉 [നിങ്ങളുടെ_വെബ്സൈറ്റ്_ലിങ്ക്]`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById("generated-price-list").value = listText;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // ബൾക്ക് മെസ്സേജ് അയക്കുന്ന ബോക്സിലേക്കും ഇത് തനിയെ സെറ്റാകും
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById("offer-message").value = listText;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    })
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .catch(error => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                console.error("Error:", error);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById("generated-price-list").value = "Failed to load prices.";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // ടെക്സ്റ്റ് ഒറ്റ ക്ലിക്കിൽ കോപ്പി ചെയ്യാൻ
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function copyPriceList() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const copyText = document.getElementById("generated-price-list");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        copyText.select();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                copyText.setSelectionRange(0, 99999);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        navigator.clipboard.writeText(copyText.value);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                alert("Price list copied to clipboard!");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function loadNumbersForRoute() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const selectedRoute = document.getElementById("route-select").value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const savedNumbers = localStorage.getItem(selectedRoute) || "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById("phone-numbers").value = savedNumbers;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function saveNumbersForRoute() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const selectedRoute = document.getElementById("route-select").value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const numbersStr = document.getElementById("phone-numbers").value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                localStorage.setItem(selectedRoute, numbersStr);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function startBulkSend() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const numbersStr = document.getElementById("phone-numbers").value.trim();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        messageText = document.getElementById("offer-message").value.trim();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (!numbersStr || !messageText) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            alert("Please fill numbers and message!");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        numberList = numbersStr.split('\n').map(num => num.trim()).filter(num => num.length > 0);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                currentIndex = 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (numberList.length === 0) return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                sendNextMessage();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function sendNextMessage() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (currentIndex >= numberList.length) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const statusDiv = document.getElementById("status");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        statusDiv.style.display = "block";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    statusDiv.innerText = "🎉 All messages sent!";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById("send-btn").disabled = false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById("send-btn").disabled = true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const currentPhone = numberList[currentIndex];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const encodedMsg = encodeURIComponent(messageText);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const whatsappUrl = `https://api.whatsapp.com/send?phone=${currentPhone}&text=${encodedMsg}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    currentIndex++;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const statusDiv = document.getElementById("status");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    statusDiv.style.display = "block";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            statusDiv.innerHTML = `Sending to ${currentPhone}...<br><button onclick="sendNextMessage()">Next ➔</button>`;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    window.open(whatsappUrl, '_blank');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </html>
